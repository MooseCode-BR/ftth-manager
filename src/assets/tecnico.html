<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Técnico de Internet Animado</title>
    <style>
        /* Estilos gerais para centralizar a animação na tela */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
            /* Fundo cinza bem claro */
            font-family: sans-serif;
        }

        /* Container com um leve cartão branco para dar destaque */
        .animation-container {
            width: 320px;
            height: 320px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Animação do braço dando tchauzinho */
        .waving-arm {
            /* Ponto de rotação no ombro do personagem */
            transform-origin: 125px 100px;
            animation: wave 0.45s infinite alternate ease-in-out;
        }

        @keyframes wave {
            0% {
                transform: rotate(-15deg);
            }

            100% {
                transform: rotate(25deg);
            }
        }

        /* Animação de respiração do personagem (sobe e desce bem devagar) */
        .character {
            animation: breathe 1.5s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% {
                transform: translateY(0px);
            }

            100% {
                transform: translateY(3px);
            }
        }

        /* Animação de piscar os olhos */
        .eyes {
            transform-origin: 125px 73px;
            animation: blink 3.5s infinite;
        }

        @keyframes blink {

            0%,
            90%,
            100% {
                transform: scaleY(1);
            }

            95% {
                transform: scaleY(0.1);
            }

            /* Olho fechado */
        }
    </style>
</head>

<body>

    <div class="animation-container">
        <svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">

            <!-- Definição do filtro para criar o contorno da silhueta -->
            <defs>
                <filter id="contorno-preto" x="-20%" y="-20%" width="140%" height="140%">
                    <!-- Expande a forma (alpha) do desenho -->
                    <feMorphology in="SourceAlpha" operator="dilate" radius="2.5" result="expandido" />
                    <!-- Preenche a forma expandida com preto -->
                    <feFlood flood-color="#000000" result="cor-preta" />
                    <!-- Aplica a cor preta apenas na área expandida -->
                    <feComposite in="cor-preta" in2="expandido" operator="in" result="contorno" />
                    <!-- Junta o contorno preto (atrás) com o desenho original (frente) -->
                    <feMerge>
                        <feMergeNode in="contorno" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- Sombra no chão (fora do filtro para não ter contorno) -->
            <ellipse cx="125" cy="210" rx="45" ry="6" fill="#e2e8f0" />

            <!-- Grupo principal do personagem animado COM O FILTRO DE CONTORNO APLICADO -->
            <g class="character" filter="url(#contorno-preto)">

                <!-- ================= CORPO ================= -->
                <!-- Pernas -->
                <line x1="125" y1="150" x2="105" y2="205" stroke="#1E293B" stroke-width="8" stroke-linecap="round" />
                <line x1="125" y1="150" x2="145" y2="205" stroke="#1E293B" stroke-width="8" stroke-linecap="round" />

                <!-- EPI: Perneiras (Tiras nas coxas) -->
                <line x1="111" y1="168" x2="123" y2="162" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" />
                <line x1="139" y1="168" x2="127" y2="162" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" />

                <!-- Tronco -->
                <line x1="125" y1="91" x2="125" y2="155" stroke="#1E293B" stroke-width="8" stroke-linecap="round" />

                <!-- EPI: Suspensórios (Tiras no ombro) e Fita Peitoral -->
                <path d="M 125 95 L 118 135" stroke="#FF6B00" stroke-width="3" />
                <path d="M 125 95 L 132 135" stroke="#FF6B00" stroke-width="3" />
                <line x1="119" y1="115" x2="131" y2="115" stroke="#FF6B00" stroke-width="3" stroke-linecap="round" />
                <circle cx="125" cy="115" r="2.5" fill="none" stroke="#1E293B" stroke-width="1.5" />
                <!-- Argola frontal -->

                <!-- ================= EPI: CINTURÃO DE SEGURANÇA ================= -->
                <rect x="110" y="132" width="30" height="14" rx="4" fill="#FF6B00" />
                <rect x="122" y="132" width="6" height="14" rx="1.5" fill="#CC5500" /> <!-- Fivela -->

                <!-- Argolas laterais do EPI -->
                <circle cx="110" cy="139" r="3" fill="none" stroke="#1E293B" stroke-width="2" />
                <circle cx="140" cy="139" r="3" fill="none" stroke="#1E293B" stroke-width="2" />

                <!-- EPI: Talabarte (Corda de segurança com mosquetão) -->
                <path d="M 140 139 Q 155 155 145 185" fill="none" stroke="#FF6B00" stroke-width="3"
                    stroke-linecap="round" />
                <rect x="142" y="185" width="6" height="12" rx="3" fill="none" stroke="#1E293B" stroke-width="2" />
                <!-- Mosquetão -->

                <!-- ================= ESCADA NO OMBRO (Cor Laranja) ================= -->
                <g transform="translate(125, 80) rotate(-20)">
                    <!-- Trilhos laterais -->
                    <line x1="-80" y1="-14" x2="70" y2="-14" stroke="#FF6B00" stroke-width="5" stroke-linecap="round" />
                    <line x1="-80" y1="14" x2="70" y2="14" stroke="#FF6B00" stroke-width="5" stroke-linecap="round" />
                    <!-- Degraus -->
                    <line x1="-65" y1="-14" x2="-65" y2="14" stroke="#FF6B00" stroke-width="4.5" />
                    <line x1="-40" y1="-14" x2="-40" y2="14" stroke="#FF6B00" stroke-width="4.5" />
                    <line x1="-15" y1="-14" x2="-15" y2="14" stroke="#FF6B00" stroke-width="4.5" />
                    <line x1="10" y1="-14" x2="10" y2="14" stroke="#FF6B00" stroke-width="4.5" />
                    <line x1="35" y1="-14" x2="35" y2="14" stroke="#FF6B00" stroke-width="4.5" />
                    <line x1="60" y1="-14" x2="60" y2="14" stroke="#FF6B00" stroke-width="4.5" />
                </g>

                <!-- Braço esquerdo segurando a escada (mão no trilho inferior) -->
                <path d="M 125 98 Q 110 115 92 107" fill="none" stroke="#1E293B" stroke-width="8"
                    stroke-linecap="round" />
                <circle cx="92" cy="107" r="4" fill="#1E293B" />

                <!-- ================= CABEÇA ================= -->
                <!-- Rosto -->
                <circle cx="125" cy="75" r="16" fill="#FFF" stroke="#1E293B" stroke-width="4" />

                <g class="eyes">
                    <!-- Olhinhos -->
                    <circle cx="119" cy="73" r="2.5" fill="#1E293B" />
                    <circle cx="131" cy="73" r="2.5" fill="#1E293B" />
                </g>

                <!-- Sorriso simpático -->
                <path d="M 120 79 Q 125 84 130 79" fill="none" stroke="#1E293B" stroke-width="2.5"
                    stroke-linecap="round" />

                <!-- ================= CAPACETE (Cor Laranja) ================= -->
                <!-- Domo do capacete -->
                <path d="M 107 72 A 18 18 0 0 1 143 72 Z" fill="#FF6B00" stroke="#1E293B" stroke-width="3"
                    stroke-linejoin="round" />
                <!-- Aba do capacete -->
                <path d="M 103 72 Q 125 78 147 72" fill="none" stroke="#FF6B00" stroke-width="6"
                    stroke-linecap="round" />

                <!-- Símbolo de Wi-Fi no capacete (Branco) -->
                <g stroke="#FFF" stroke-width="1.8" stroke-linecap="round" fill="none">
                    <path d="M 116 57 A 9 9 0 0 1 134 57" />
                    <path d="M 120 61 A 5 5 0 0 1 130 61" />
                    <circle cx="125" cy="65" r="1.5" fill="#FFF" stroke="none" />
                </g>

                <!-- ================= BRAÇO DIREITO (Dando Tchau) ================= -->
                <g class="waving-arm">
                    <path d="M 125 100 Q 155 105 162 65" fill="none" stroke="#1E293B" stroke-width="8"
                        stroke-linecap="round" />
                    <!-- Mão direita (bolinha) -->
                    <circle cx="162" cy="65" r="4" fill="#1E293B" />
                </g>

            </g>
        </svg>
    </div>

</body>

</html>
