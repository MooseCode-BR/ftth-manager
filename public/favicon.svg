            <rect x="5" y="17" width="3" height="6" rx="0.5" fill="#FFE135" stroke="none" />
            {/* Retangulo Meio */}
            <rect x="10.5" y="17" width="3" height="6" rx="0.5" fill="#FFE135" stroke="none" />
            {/* Retangulo Direita */}
            <rect x="16" y="17" width="3" height="6" rx="0.5" fill="#FFE135" stroke="none" />
            {/* Alça Cima */}
